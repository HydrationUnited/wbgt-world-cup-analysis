# Configuration for the WBGT / FIFA World Cup heat analysis.
# Scripts and the package import parameters from here rather than hard-coding them.

project:
  name: heathack
  hpc_account: UCLA0088          # PBS -A for Casper jobs (change to your allocation)
  queue: casper
  python: /glade/u/apps/opt/conda/envs/npl/bin/python

heat_metric:
  primary: wbgt_liljegren          # outdoor WBGT (thermofeel Liljegren; 0.7 Tnw + 0.2 Tg + 0.1 Ta)
  variants:                        # all computed per venue-hour
    - wbgt_liljegren               # sunlit physical WBGT (needs ssrd, fdir, wind, cos zenith)
    - wbgt_shade                   # 0.7*Tw + 0.3*Ta (shaded/indoor; matches WBGT-ERA5-v2.0)
    - swbgt_bom                    # 0.567*Ta + 0.393*e + 3.94 (simplified; humidity-biased)
    - tw_stull                     # thermodynamic wet-bulb (Stull 2011; sea-level)
    - tw_davies_jones              # thermodynamic wet-bulb (pressure-aware; altitude venues)
  threshold_c: 32.0                # FIFA cooling-break threshold (WBGT)
  extra_thresholds_c: [26.0, 28.0] # additional thresholds (FIFPRO guidance)

game_window:
  pre_buffer_hours: 1.0
  post_buffer_hours: 1.0
  default_match_duration_hours: 2.0   # ~105 min play + halftime; extra time handled per match

climatology:
  period: [1960, 1990]
  sensitivity_period: [1979, 1990]    # subset avoiding the ERA5 pre-1979 back extension
  spread_metrics: [mean, ci95, full_range]

world_cups:
  # men's World Cups covered by ERA5 (1930/34/38 predate ERA5; 2026 not yet in the archive)
  tournaments:
    - {year: 1950, host: Brazil,       sex: men, in_scope: true, months: [6, 7]}
    - {year: 1954, host: Switzerland,  sex: men, in_scope: true, months: [6, 7]}
    - {year: 1958, host: Sweden,       sex: men, in_scope: true, months: [6]}
    - {year: 1962, host: Chile,        sex: men, in_scope: true, months: [5, 6]}
    - {year: 1966, host: England,      sex: men, in_scope: true, months: [7]}
    - {year: 1970, host: Mexico,       sex: men, in_scope: true, months: [5, 6]}
    - {year: 1974, host: West Germany, sex: men, in_scope: true, months: [6, 7]}
    - {year: 1978, host: Argentina,    sex: men, in_scope: true, months: [6]}
    - {year: 1982, host: Spain,        sex: men, in_scope: true, months: [6, 7]}
    - {year: 1986, host: Mexico,       sex: men, in_scope: true, months: [5, 6]}
    - {year: 1990, host: Italy,        sex: men, in_scope: true, months: [6, 7]}
    - {year: 1994, host: United States, sex: men, in_scope: true, months: [6, 7]}
    - {year: 1998, host: France,       sex: men, in_scope: true, months: [6, 7]}
    - {year: 2002, host: Korea/Japan,  sex: men, in_scope: true, months: [5, 6]}
    - {year: 2006, host: Germany,      sex: men, in_scope: true, months: [6, 7]}
    - {year: 2010, host: South Africa, sex: men, in_scope: true, months: [6, 7]}
    - {year: 2014, host: Brazil,       sex: men, in_scope: true, months: [6, 7]}
    - {year: 2018, host: Russia,       sex: men, in_scope: true, months: [6, 7]}
    - {year: 2022, host: Qatar,        sex: men, in_scope: true, months: [11, 12]}
  months_of_interest: [6, 7, 11, 12]
  extract_years: [1960, 2024]
  climatology_years: [1960, 1990]

discipline:
  fields: [yellow_cards, red_cards, fouls, goals, substitutions, injuries, cooling_breaks]

era5:
  root: /glade/campaign/collections/gdex/data/d633000
  sfc_analysis: e5.oper.an.sfc          # hourly surface analysis, UTC, 0.25 deg, lon 0-360
  fc_accumu: e5.oper.fc.sfc.accumu      # forecast accumulations (shortwave radiation)
  vars:      # analysis (an.sfc): instantaneous at HH:00 UTC
    t2m: {code: 128_167_2t, ncvar: VAR_2T,  units: K,      stream: an}
    d2m: {code: 128_168_2d, ncvar: VAR_2D,  units: K,      stream: an}
    sp:  {code: 128_134_sp, ncvar: SP,      units: Pa,     stream: an}
    msl: {code: 128_151_msl, ncvar: MSL,    units: Pa,     stream: an}
    u10: {code: 128_165_10u, ncvar: VAR_10U, units: m s-1, stream: an}
    v10: {code: 128_166_10v, ncvar: VAR_10V, units: m s-1, stream: an}
  fc_vars:   # forecast (fc.sfc.accumu): downward and direct shortwave [J m-2 -> W m-2]
    ssrd: {code: 128_169_ssrd, ncvar: SSRD, units: J m-2, stream: fc_accumu}
    fdir: {code: 228_021_fdir, ncvar: FDIR, units: J m-2, stream: fc_accumu}

paths:
  root: /glade/derecho/scratch/gavinmad/shared/Heathack
  scratch_tmp: /glade/derecho/scratch/gavinmad/tmp
